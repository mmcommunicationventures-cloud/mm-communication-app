<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M&M Communication Icons</title>
</head>
<body>
    <h1>M&M Communication App Icons</h1>
    
    <!-- 192x192 Icon -->
    <svg width="192" height="192" viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
        <!-- Background Circle -->
        <circle cx="96" cy="96" r="92" fill="#1a1a2e" stroke="#ffff00" stroke-width="8"/>
        
        <!-- Red M -->
        <g transform="translate(50, 60)">
            <path d="M 10 50 L 10 10 L 30 30 L 30 10 L 50 10 L 50 50" fill="none" stroke="#ff3333" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
        </g>
        
        <!-- Green M -->
        <g transform="translate(80, 60)">
            <path d="M 10 50 L 10 10 L 30 30 L 30 10 L 50 10 L 50 50" fill="none" stroke="#00cc66" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
        </g>
        
        <!-- Red Circuit Dots and Lines -->
        <circle cx="35" cy="105" r="4" fill="#ff3333"/>
        <line x1="35" y1="105" x2="55" y2="95" stroke="#ff3333" stroke-width="2"/>
        <circle cx="35" cy="125" r="4" fill="#ff3333"/>
        <line x1="35" y1="125" x2="55" y2="105" stroke="#ff3333" stroke-width="2"/>
        
        <!-- Green Circuit Dots and Lines -->
        <circle cx="157" cy="105" r="4" fill="#00cc66"/>
        <line x1="157" y1="105" x2="137" y2="95" stroke="#00cc66" stroke-width="2"/>
        <circle cx="157" cy="125" r="4" fill="#00cc66"/>
        <line x1="157" y1="125" x2="137" y2="105" stroke="#00cc66" stroke-width="2"/>
    </svg>
    
    <!-- 512x512 Icon -->
    <svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
        <!-- Background Circle -->
        <circle cx="256" cy="256" r="248" fill="#1a1a2e" stroke="#ffff00" stroke-width="20"/>
        
        <!-- Red M -->
        <g transform="translate(120, 140)">
            <path d="M 20 140 L 20 30 L 80 80 L 80 30 L 140 30 L 140 140" fill="none" stroke="#ff3333" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
        </g>
        
        <!-- Green M -->
        <g transform="translate(220, 140)">
            <path d="M 20 140 L 20 30 L 80 80 L 80 30 L 140 30 L 140 140" fill="none" stroke="#00cc66" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
        </g>
        
        <!-- Red Circuit Dots and Lines -->
        <circle cx="100" cy="280" r="10" fill="#ff3333"/>
        <line x1="100" y1="280" x2="140" y2="260" stroke="#ff3333" stroke-width="4"/>
        <circle cx="100" cy="340" r="10" fill="#ff3333"/>
        <line x1="100" y1="340" x2="140" y2="280" stroke="#ff3333" stroke-width="4"/>
        
        <!-- Green Circuit Dots and Lines -->
        <circle cx="412" cy="280" r="10" fill="#00cc66"/>
        <line x1="412" y1="280" x2="372" y2="260" stroke="#00cc66" stroke-width="4"/>
        <circle cx="412" cy="340" r="10" fill="#00cc66"/>
        <line x1="412" y1="340" x2="372" y2="280" stroke="#00cc66" stroke-width="4"/>
    </svg>
    
</body>
</html>
